services:
  backend:
    image: dnd-components-backend:local
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "3001:3001"
    volumes:
      - backend-data:/app/data
    environment:
      NODE_ENV: production

  frontend:
    image: dnd-components-frontend:local
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "8081:8080"
    environment:
      NODE_ENV: production
    depends_on:
      - backend

volumes:
  backend-data:
